[pytest]
# Pytest configuration for AWS Automated Access Review

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes
    -ra

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    style: Style tests
    slow: Slow running tests
    aws: Tests that require AWS services (should be mocked)

# Coverage options
# Uncomment to enable coverage reporting
# addopts = --cov=src/lambda --cov-report=html --cov-report=term-missing

# Minimum coverage threshold
# coverage:fail_under = 80

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Test execution
# parallel: true  # Uncomment to enable parallel test execution with pytest-xdist
# workers: auto   # Uncomment to use automatic worker count

# Timeout
# timeout = 300  # Uncomment to set a global timeout (requires pytest-timeout)

# Asyncio mode (if using async tests)
# asyncio_mode = auto

# Mocking
# mock_use_standalone_module = false
